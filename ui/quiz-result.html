<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Ping - Quiz Result</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div style="width: 24px;"></div> <!-- Spacer -->
            <div class="title">퀴즈 결과</div>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </header>

        <!-- Content Area -->
        <div class="content">
            <div class="result-summary">
                <div class="result-score">18 / 20</div>
                <div class="result-text">정답을 맞췄습니다!</div>
            </div>

            <div class="incorrect-list-title">틀린 단어 복습하기</div>
            
            <div class="incorrect-list">
                <div class="incorrect-item">
                    <div class="incorrect-word">banana</div>
                    <div class="incorrect-meaning">1. 바나나</div>
                </div>
                <div class="incorrect-item">
                    <div class="incorrect-word">grape</div>
                    <div class="incorrect-meaning">1. 포도</div>
                </div>
            </div>

            <a href="wordbook.html" class="btn btn-primary">확인</a>
        </div>
    </div>
</body>
</html>
