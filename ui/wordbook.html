<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Ping - Wordbook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="title">단어장</div>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </header>

        <!-- Content Area -->
        <div class="content">
            <div class="add-btn-container">
                <button class="add-btn"><i class="fas fa-plus"></i></button>
            </div>

            <div class="list-container">
                <!-- Wordbook Item 1 -->
                <div class="list-item">
                    <div class="list-item-header">
                        <div class="list-item-title">토익 필수 영단어</div>
                        <div class="list-item-count">120 단어</div>
                    </div>
                    <div class="list-item-actions">
                        <a href="flashcard.html" class="action-btn flashcard">
                            <i class="fas fa-clone"></i> 플래시카드
                        </a>
                        <a href="quiz.html" class="action-btn quiz">
                            <i class="fas fa-question-circle"></i> 퀴즈
                        </a>
                    </div>
                </div>

                <!-- Wordbook Item 2 -->
                <div class="list-item">
                    <div class="list-item-header">
                        <div class="list-item-title">수능 영단어</div>
                        <div class="list-item-count">45 단어</div>
                    </div>
                    <div class="list-item-actions">
                        <a href="flashcard.html" class="action-btn flashcard">
                            <i class="fas fa-clone"></i> 플래시카드
                        </a>
                        <a href="quiz.html" class="action-btn quiz">
                            <i class="fas fa-question-circle"></i> 퀴즈
                        </a>
                    </div>
                </div>

                <!-- Wordbook Item 3 (Empty) -->
                <div class="list-item">
                    <div class="list-item-header">
                        <div class="list-item-title">새로운 단어장</div>
                        <div class="list-item-count">0 단어</div>
                    </div>
                    <div class="list-item-actions">
                        <button class="action-btn flashcard" disabled>
                            <i class="fas fa-clone"></i> 플래시카드
                        </button>
                        <button class="action-btn quiz" disabled>
                            <i class="fas fa-question-circle"></i> 퀴즈
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="nav-bar">
            <a href="wordbook.html" class="nav-item active">
                <i class="fas fa-book"></i>
                <span>단어장</span>
            </a>
            <a href="home.html" class="nav-center-btn">
                <i class="fas fa-search"></i>
            </a>
            <a href="alarm-list.html" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>알람</span>
            </a>
        </nav>
    </div>
</body>
</html>
